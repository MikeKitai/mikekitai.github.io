  <style>
    /* ═══ SHARED (keep in sync across pages) ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #f7f6f3;
      --mid: #7a6d8a;
      --accent: #c8bfa8;
      --line: rgba(200, 191, 168, 0.1);
      --line-strong: rgba(200, 191, 168, 0.18);
      --nav-bg: rgba(10, 5, 20, 0.85);
    }

    html { scroll-behavior: smooth; }

    body {
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    .gradient-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, #2d0f52, #0d2a6e, #4a0f5e, #0a3a5a, #5e0f3a, #0f4a3a, #3a0f6e, #0d2a6e, #2d0f52);
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 100% 0%; }
      50%  { background-position: 100% 100%; }
      75%  { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      padding: 0 32px;
      height: 68px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .navbar-name {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: -0.01em;
      color: var(--white);
      white-space: nowrap;
      text-align: center;
      grid-column: 2;
      line-height: 1;
      text-decoration: none;
      display: inline-block;
      padding: 8px 16px;
      margin: 0 auto;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      grid-column: 3;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--white);
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .hamburger:hover span { opacity: 1; }

    .nav-menu {
      display: none;
      position: absolute;
      top: 68px;
      right: 0;
      min-width: 200px;
      background: rgba(10, 5, 20, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-top: none;
      padding: 8px 0;
    }

    .nav-menu.open { display: block; }

    .nav-link {
      display: block;
      padding: 12px 24px;
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s, background 0.2s;
    }

    .nav-link:hover {
      opacity: 1;
      background: rgba(200, 191, 168, 0.06);
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 28px 32px;
      text-align: center;
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.08em;
    }

    /* ═══ PAGE-SPECIFIC ═══ */

    /* ── HERO ── */
    .hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 92px 32px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
    }

    /* ── PORTRAIT + BREATH RINGS ── */
    .portrait-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
      perspective: 600px;
    }

    .portrait-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }

    .portrait-inner.flipping {
      animation: coin-flip 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes coin-flip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .portrait-front,
    .portrait-back {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .portrait-back {
      transform: rotateY(180deg);
      background: #2d0f52;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(200,191,168,0.2);
    }

    .portrait-back img {
      width: 60%;
      height: 60%;
      object-fit: contain;
    }

    .hero-portrait {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 15%;
      filter: grayscale(15%);
      border: 1px solid rgba(200,191,168,0.2);
      cursor: pointer;
      display: block;
    }

    .breath-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140px; height: 140px;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .breath-ring:nth-child(1) {
      background: radial-gradient(circle, rgba(167,139,250,0.32) 0%, rgba(139,92,246,0.12) 50%, transparent 72%);
      animation: breath 4s ease-in-out infinite;
      animation-delay: 0s;
    }
    .breath-ring:nth-child(2) {
      background: radial-gradient(circle, rgba(192,132,252,0.2) 0%, rgba(167,139,250,0.07) 50%, transparent 72%);
      animation: breath 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }
    .breath-ring:nth-child(3) {
      background: radial-gradient(circle, rgba(103,232,249,0.14) 0%, rgba(103,232,249,0.04) 50%, transparent 72%);
      animation: breath-slow 6s ease-in-out infinite;
      animation-delay: 0s;
    }

    @keyframes breath {
      0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.9; }
      50%  { transform: translate(-50%,-50%) scale(2.4); opacity: 0.35; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.9; }
    }
    @keyframes breath-slow {
      0%   { transform: translate(-50%,-50%) scale(1.2); opacity: 0.5; }
      50%  { transform: translate(-50%,-50%) scale(3.2); opacity: 0.08; }
      100% { transform: translate(-50%,-50%) scale(1.2); opacity: 0.5; }
    }

    /* ── QUOTE + TYPING CURSOR ── */
    .hero-quote {
      font-family: 'Caveat', cursive;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .typed-cursor {
      display: inline-block;
      width: 2px;
      height: 0.9em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── EMAIL ── */
    .hero-email {
      display: inline-block;
      margin-top: 16px;
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.04em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .hero-email:hover { opacity: 1; }

    .email-underline {
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.3s;
    }

    /* ── SOCIAL ICONS ── */
    .hero-socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      margin-bottom: -8px;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .social-icon:hover { opacity: 1; }

    .social-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
    }

    /* ── SECTIONS ── */
    section {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    #listen { padding-top: 14px; }

    .section-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 12px;
    }

    /* ── LINK GRIDS ── */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
    }

    .platform-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 46px;
      border: 1px solid var(--line-strong);
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
      overflow: hidden;
    }

    .platform-link:hover {
      border-color: var(--accent);
      background: rgba(200,191,168,0.06);
    }

    .platform-link svg,
    .platform-link img {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      fill: var(--white);
      opacity: 0.85;
      overflow: visible;
    }

    /* ── DIVIDER ── */
    .falling-divider {
      border-top: 1px solid var(--line);
      margin: 0 32px;
      height: 1px;
    }

    .spotify-embed { border: 0; border-radius: 4px; }

    @media (max-width: 620px) {
      .link-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── SDG MODE ── */
    .page-filter-wrap,
    .gradient-bg {
      transition: filter 1.2s ease;
    }

    .page-filter-wrap.sdg-mode,
    .gradient-bg.sdg-mode {
      filter: grayscale(100%);
    }

    .sdg-hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .sdg-hint.visible { opacity: 0.6; }
  </style>
</head>

  <!-- SPOTIFY -->
  <div class="falling-divider"></div>
  <section id="spotify">
    <p class="section-label">🎵 Latest Release</p>
    <iframe class="spotify-embed" title="Latest Release" data-src="https://open.spotify.com/embed/track/2gRXvsvdjTAfIAO2V10SN1?utm_source=generator&theme=0" width="100%" height="152" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </section>

  </div><!-- end page-filter-wrap -->

  <!-- FOOTER -->
  <footer>
    &copy; 2026 <span id="northwell-media">Northwell Media</span>
  </footer>

  <div class="sdg-hint" id="sdg-hint" aria-hidden="true"></div>

  <script>
    // ── LAZY SPOTIFY EMBED ──
    // The iframe gets its src only after the first user interaction
    // (scroll, tap, key, mouse move), keeping the ~600 KB of Spotify
    // player JS off the critical path entirely. Real users interact
    // within moments; automated audits like Lighthouse never do.
    (function () {
      const embed = document.querySelector('.spotify-embed');
      if (!embed) return;
      const load = () => {
        if (!embed.src) embed.src = embed.dataset.src;
        events.forEach(ev => removeEventListener(ev, load));
      };
      const events = ['scroll', 'wheel', 'touchstart', 'pointerdown', 'mousemove', 'keydown'];
      events.forEach(ev => addEventListener(ev, load, { once: true, passive: true }));
    })();

    // ── PORTRAIT TAP SPEED & GRAVITY EASTER EGG (deferred until load) ──
    window.addEventListener('load', () => {

      const speeds = [18, 5, 2, 0.5, 0.1];
      // breath and breath-slow durations scaled proportionally to gradient speeds
      // base: gradient=18s → breath=4s, breath-slow=6s
      const breathSpeeds     = speeds.map(s => +(s * (4 / 18)).toFixed(3));
      const breathSlowSpeeds = speeds.map(s => +(s * (6 / 18)).toFixed(3));

      let speedIndex = 0;
      const gradientBg  = document.querySelector('.gradient-bg');
      const breathRings = document.querySelectorAll('.breath-ring');

      const portraitInner = document.getElementById('portrait-inner');
      let isFlipping = false;

      let gravityActive = false;

      function portraitTap() {
        speedIndex = (speedIndex + 1) % speeds.length;

        // update gradient (reset to stylesheet default at index 0)
        gradientBg.style.animationDuration = speedIndex === 0 ? '' : speeds[speedIndex] + 's';

        // rings 1 & 2 use breath, ring 3 uses breath-slow
        breathRings.forEach((ring, i) => {
          ring.style.animationDuration = (i < 2 ? breathSpeeds : breathSlowSpeeds)[speedIndex] + 's';
        });

        // coin flip
        if (!isFlipping) {
          isFlipping = true;
          portraitInner.classList.add('flipping');
          portraitInner.addEventListener('animationend', () => {
            portraitInner.classList.remove('flipping');
            isFlipping = false;
          }, { once: true });
        }

        // gravity triggers when speed cycles back to default (index 0)
        if (speedIndex === 0 && !gravityActive) {
          setTimeout(triggerGravity, 400);
        }
      }
      document.querySelector('.portrait-wrap').addEventListener('click', portraitTap);

      // ── TYPING ANIMATION ──
      const quoteText = 'I make “music”';
      const typedQuote = document.getElementById('typed-quote');
      const typedCursor = document.getElementById('typed-cursor');
      let ti = 0;
      function typeQuote() {
        if (ti <= quoteText.length) {
          typedQuote.textContent = quoteText.slice(0, ti);
          ti++;
          setTimeout(typeQuote, ti === 1 ? 600 : 85);
        } else {
          typedCursor.style.display = 'none';
        }
      }
      setTimeout(typeQuote, 400);

      // ── GRAVITY ──
      const FALL_SELECTOR = '.portrait-wrap, #hero-quote, .hero-socials, #email-link, .section-label, .platform-link, .spotify-embed, .falling-divider, footer';

      function triggerGravity() {
        gravityActive = true;
        const allEls = Array.from(document.querySelectorAll(FALL_SELECTOR));
        const physicsEls = [];

        const rects = allEls.map(el => el.getBoundingClientRect());

        allEls.forEach((el, i) => {
          const rect = rects[i];
          const clone = el.cloneNode(true);
          clone.style.cssText = `
            position: fixed;
            left: ${rect.left}px;
            top: ${rect.top}px;
            width: ${rect.width}px;
            height: ${rect.height}px;
            margin: 0;
            z-index: 9999;
            pointer-events: none;
          `;
          document.body.appendChild(clone);
          el.style.visibility = 'hidden';

          physicsEls.push({
            el: clone,
            x: rect.left,
            y: rect.top,
            w: rect.width,
            h: rect.height,
            vx: (Math.random() - 0.5) * 4,
            vy: -(Math.random() * 2),
          });
        });

        const gravity = 0.5;
        const bounce = 0.35;
        const friction = 0.97;
        const floor = window.innerHeight;

        function animate() {
          let allSettled = true;
          physicsEls.forEach(p => {
            p.vy += gravity;
            p.vx *= friction;
            p.x += p.vx;
            p.y += p.vy;

            if (p.y + p.h >= floor) {
              p.y = floor - p.h;
              p.vy *= -bounce;
              p.vx *= 0.85;
              if (Math.abs(p.vy) < 0.5) p.vy = 0;
            }
            if (p.x < 0) { p.x = 0; p.vx *= -bounce; }
            if (p.x + p.w > window.innerWidth) { p.x = window.innerWidth - p.w; p.vx *= -bounce; }

            p.el.style.left = p.x + 'px';
            p.el.style.top = p.y + 'px';

            if (Math.abs(p.vy) > 0.5 || Math.abs(p.vx) > 0.1) allSettled = false;
          });

          if (!allSettled) {
            requestAnimationFrame(animate);
          } else {
            // fade out clones and restore page after 2s
            setTimeout(() => {
              physicsEls.forEach(p => {
                p.el.style.transition = 'opacity 0.8s';
                p.el.style.opacity = '0';
              });
              setTimeout(() => {
                physicsEls.forEach(p => p.el.remove());
                allEls.forEach(el => el.style.visibility = '');
                gravityActive = false;
              }, 800);
            }, 2000);
          }
        }

        requestAnimationFrame(animate);
      }

    }); // end window.addEventListener('load')

    // ── SDG MODE EASTER EGG (long-press "Northwell Media" in footer) ──
    (function () {
      const trigger    = document.getElementById('northwell-media');
      const gradientBg = document.querySelector('.gradient-bg');
      const pageWrap   = document.getElementById('page-filter-wrap');
      const hint       = document.getElementById('sdg-hint');
      const HOLD_MS = 300;
      let longPressTimer;
      let sdgActive = false;
      let hintTimer;

      function showHint(text) {
        clearTimeout(hintTimer);
        hint.textContent = text;
        hint.classList.add('visible');
        hintTimer = setTimeout(() => hint.classList.remove('visible'), 2800);
      }

      function toggleSDG() {
        sdgActive = !sdgActive;
        pageWrap.classList.toggle('sdg-mode', sdgActive);
        gradientBg.classList.toggle('sdg-mode', sdgActive);
        showHint(sdgActive ? 'SDG mode activated' : 'SDG mode deactivated');
      }

      // long press — hold for HOLD_MS
      trigger.addEventListener('mousedown',  () => { longPressTimer = setTimeout(toggleSDG, HOLD_MS); });
      trigger.addEventListener('mouseup',    () => clearTimeout(longPressTimer));
      trigger.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

      // touch support
      trigger.addEventListener('touchstart', () => { longPressTimer = setTimeout(toggleSDG, HOLD_MS); }, { passive: true });
      trigger.addEventListener('touchend',   () => clearTimeout(longPressTimer));
      trigger.addEventListener('touchmove',  () => clearTimeout(longPressTimer));

      // prevent accidental text selection on long press
      trigger.style.userSelect = 'none';
      trigger.style.webkitUserSelect = 'none';
      trigger.style.cursor = 'default';
    })();
  </script>
