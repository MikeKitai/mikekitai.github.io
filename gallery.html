<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #f7f6f3;
      --mid: #7a6d8a;
      --accent: #c8bfa8;
    }

    html { scroll-behavior: smooth; }

    body {
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── ANIMATED GRADIENT ── */
    .gradient-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(
        135deg,
        #1a0a2e,
        #0d1f4a,
        #2d0f3d,
        #0a2a3a,
        #3d0f2a,
        #0f2d2a,
        #2a0f4a,
        #1a0a2e
      );
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 100% 0%; }
      50%  { background-position: 100% 100%; }
      75%  { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      padding: 0 32px;
      height: 68px;
      background: rgba(10, 5, 20, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,191,168,0.1);
    }

    .navbar-name {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: -0.01em;
      color: var(--white);
      white-space: nowrap;
      text-align: center;
      grid-column: 2;
      line-height: 1;
      text-decoration: none;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      grid-column: 3;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--white);
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .hamburger:hover span { opacity: 1; }

    .nav-menu {
      display: none;
      position: absolute;
      top: 68px;
      right: 0;
      min-width: 200px;
      background: rgba(10, 5, 20, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,191,168,0.1);
      border-top: none;
      padding: 8px 0;
    }

    .nav-menu.open { display: block; }

    .nav-menu a {
      display: block;
      padding: 12px 24px;
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s, background 0.2s;
    }

    .nav-menu a:hover {
      opacity: 1;
      background: rgba(200,191,168,0.06);
    }

    /* ── GALLERY ── */
    .gallery-header {
      max-width: 860px;
      margin: 0 auto;
      padding: 92px 32px 20px;
      text-align: center;
    }

    .gallery-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(32px, 5vw, 52px);
      letter-spacing: -0.01em;
      color: var(--white);
    }

    .masonry {
      columns: 3 220px;
      column-gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      border: 1px solid rgba(200,191,168,0.1);
      transition: opacity 0.2s;
    }

    .masonry-item img:hover { opacity: 0.85; }

    .gallery-empty {
      text-align: center;
      padding: 60px 32px;
      color: var(--mid);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    @media (max-width: 560px) {
      .masonry { columns: 2 140px; }
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-name" href="index.html">Mike Kitai</a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
    </div>
  </nav>

  <!-- GALLERY -->
  <div class="gallery-header">
    <h2>Gallery</h2>
  </div>

  <div class="masonry" id="masonry">
    <div class="masonry-item"><img src="IMG_5766.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5758.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5769.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5772.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5777.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5792.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5806.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5828.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5890.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_5913.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_6226.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_6250.png" alt="" /></div>
    <div class="masonry-item"><img src="IMG_6591.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_7067.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_7860.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_8156.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_8348.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_9621.jpeg" alt="" /></div>
    <div class="masonry-item"><img src="IMG_9672.jpeg" alt="" /></div>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => navMenu.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !navMenu.contains(e.target)) {
        navMenu.classList.remove('open');
      }
    });
  </script>

</body>
</html>
